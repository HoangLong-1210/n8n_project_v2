# =============================================================
# Nginx reverse proxy cho n8n (FR-0.2, FR-0.5)
# Kiến trúc: Cloudflare Tunnel → cloudflared (host) → nginx :80 → n8n :5678
# TLS/HTTPS do Cloudflare lo ở edge — nginx KHÔNG cần certbot/SSL.
#
# Cài tại: /etc/nginx/sites-available/n8n.conf
# Thay N8N_HOST_PLACEHOLDER bằng domain thật trước khi dùng:
#   sed -i "s/N8N_HOST_PLACEHOLDER/n8n.tenmien.com/g" ...
#
# Server nhiều app sau này: thêm file conf mới với server_name khác,
# cloudflared chỉ cần thêm public hostname trỏ về http://localhost:80
# =============================================================

server {
    # Chỉ nghe localhost — cloudflared kết nối nội bộ, không lộ ra LAN
    listen 127.0.0.1:80;
    server_name N8N_HOST_PLACEHOLDER;

    # Video upload/preview có thể lớn
    # (lưu ý: Cloudflare free giới hạn upload ~100MB/request)
    client_max_body_size 200M;

    # Script chèn nút "Đăng ký" vào trang đăng nhập (đặt tại /etc/nginx/n8n-custom/)
    location = /n8n-custom/signup-link.js {
        alias /etc/nginx/n8n-custom/signup-link.js;
    }

    # Trang đăng ký tài khoản (backend: POST /custom-signup do hooks.js trong n8n xử lý)
    location = /register {
        default_type text/html;
        alias /etc/nginx/n8n-custom/register.html;
    }

    location / {
        proxy_pass http://127.0.0.1:5678;

        # Tiêm script nút Đăng ký vào HTML (sub_filter chỉ áp dụng text/html;
        # phải tắt nén từ upstream thì sub_filter mới đọc được nội dung)
        proxy_set_header Accept-Encoding "";
        sub_filter '</head>' '<script defer src="/n8n-custom/signup-link.js?v=5"></script></head>';
        sub_filter_once on;

        # WebSocket — bắt buộc cho editor n8n
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Header chuẩn phía sau proxy
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # Workflow chạy lâu (tạo video AI) — không để proxy cắt kết nối sớm
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
    }

    # Header bảo mật cơ bản (FR-0.5)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
